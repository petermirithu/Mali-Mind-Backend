<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mali - Forgot Password Code</title>
  <style>
    :root {{
      --bg: #0B0F14;
      --surface: #121821;
      --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.12);
      --text: #E5E8EC;
      --text-dim: #9AA2B3;
      --primary: #0B8F4D;
      --primary-dim: rgba(11,143,77,0.15);
      --warning: #FBBF24;
      --accent: #38BDF8;
      --green-glow: rgba(11,143,77,0.35);
      --feed-insight-border: rgba(11,143,77,0.30);
      --feed-insight-glow: rgba(11,143,77,0.22);
      --shadow: rgba(0,0,0,0.32);
    }}

    * {{
      box-sizing: border-box;
    }}

    body {{
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 20% 0%, rgba(11,143,77,0.18) 0%, rgba(11,143,77,0) 48%), var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
    }}

    .wrap {{
      width: 100%;
      padding: 28px 12px;
      background: transparent;
    }}

    .card {{
      max-width: 580px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(18,24,33,0.98), rgba(18,24,33,0.94));
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px var(--shadow);
    }}

    .inner {{
      padding: 30px 24px 26px;
    }}

    .logo-wrap {{
      text-align: center;
      margin-bottom: 20px;
    }}

    .logo-row {{
      display: inline-flex;
      align-items: flex-start;
      line-height: 1;
    }}

    .logo-text {{
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -1.2px;
      color: var(--primary);
      text-shadow: 0 0 18px var(--green-glow);
      margin: 0;
      line-height: 60px;
    }}

    .logo-i-wrap {{
      position: relative;
      display: inline-block;
    }}

    .logo-gold-dot {{
      position: absolute;
      top: 6px;
      right: 2px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 7px var(--warning);
    }}    
    
    .title {{
      margin: 16px 0 10px;
      font-size: 24px;
      line-height: 1.3;
      color: var(--text);
      text-align: center;
    }}

    .copy {{
      margin: 0 0 14px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-dim);
      text-align: center;
    }}

    .code-box {{
      margin: 18px 0 14px;
      border: 1px solid var(--feed-insight-border);
      box-shadow: inset 0 0 0 1px rgba(11,143,77,0.10), 0 0 24px var(--feed-insight-glow);
      background: linear-gradient(180deg, rgba(11,143,77,0.15), rgba(11,143,77,0.07));
      border-radius: 12px;
      text-align: center;
      padding: 16px 14px;
    }}

    .code {{
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 7px;
      font-weight: 800;
      color: var(--text);
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    }}

    .expiry {{
      margin: 12px 0 0;
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
    }}

    .expiry strong {{
      color: var(--accent);
      font-weight: 700;
    }}

    .note {{
      margin: 16px 0 0;
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
    }}

    .footer {{
      margin-top: 22px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
    }}

    @media only screen and (max-width: 520px) {{
      .inner {{
        padding: 24px 16px 22px;
      }}

      .logo-text {{
        font-size: 46px;
        line-height: 50px;
      }}      

      .code {{
        font-size: 28px;
        letter-spacing: 5px;
      }}
    }}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="inner">
        <div class="logo-wrap">
          <div class="logo-row">
            <h1 class="logo-text">MAL</h1>
            <div class="logo-i-wrap">
              <h1 class="logo-text">i</h1>
              <span class="logo-gold-dot"></span>
            </div>
          </div>                    
        </div>

        <h2 class="title">Reset Password Code</h2>

        <p class="copy">Hi {name},</p>
        <p class="copy">
          Use the verification code below to reset your password.
        </p>

        <div class="code-box">
          <p class="code">{code}</p>
        </div>

        <p class="expiry">
          This code expires in <strong>{expiry_minutes} minutes</strong>.
        </p>

        <p class="note">
          If you did not request this, you can safely ignore this email.
        </p>

        <div class="footer">© Mali</div>
      </div>
    </div>
  </div>
</body>
</html>
